name: build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Build single-file binary with PyInstaller
        run: |
          pyinstaller --onefile \
            --name fleetfix \
            --collect-all textual \
            --collect-all rich \
            src/fleetfix/__main__.py
      - name: Smoke-test the built binary
        run: ./dist/fleetfix --version
      - name: Rename and checksum
        run: |
          mv dist/fleetfix dist/fleetfix-linux-x86_64
          cd dist && sha256sum fleetfix-linux-x86_64 > fleetfix-linux-x86_64.sha256
      - name: Upload artifact (workflow_dispatch builds)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: fleetfix-linux-x86_64
          path: |
            dist/fleetfix-linux-x86_64
            dist/fleetfix-linux-x86_64.sha256
      - name: Attach to release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/fleetfix-linux-x86_64
            dist/fleetfix-linux-x86_64.sha256
